<svg width="300" height="80" viewBox="0 0 300 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient-logo-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee" />
      <stop offset="100%" style="stop-color:#0891b2" />
    </linearGradient>
    <linearGradient id="silver-gradient-logo-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8" />
      <stop offset="50%" style="stop-color:#64748b" />
      <stop offset="100%" style="stop-color:#475569" />
    </linearGradient>
    <linearGradient id="text-gradient-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee" />
      <stop offset="100%" style="stop-color:#0891b2" />
    </linearGradient>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <!-- Hexagonal badge shape -->
    <path
      d="M30 4.8 L49.2 16.8 L49.2 43.2 L30 55.2 L10.8 43.2 L10.8 16.8 Z"
      fill="none"
      stroke="url(#silver-gradient-logo-dark)"
      stroke-width="1.2"
      opacity="0.4"
    />
    
    <!-- Inner hexagon for depth -->
    <path
      d="M30 9 L45 18 L45 42 L30 51 L15 42 L15 18 Z"
      fill="#0f172a"
      opacity="0.15"
    />
    
    <!-- Lightning bolt / Energy symbol -->
    <path
      d="M30 15 L37.2 28.8 L32.4 28.8 L34.8 37.2 L25.2 49.2 L27.6 33.6 L22.8 33.6 L30 15 Z"
      fill="url(#gradient-logo-dark)"
    />
    
    <!-- Sharp accent lines -->
    <path
      d="M18 30 L21 30 L22.8 25.2 L24.6 34.8"
      stroke="url(#gradient-logo-dark)"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.7"
    />
    
    <path
      d="M35.4 34.8 L37.2 25.2 L39 30 L42 30"
      stroke="url(#gradient-logo-dark)"
      stroke-width="1.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      opacity="0.7"
    />
  </g>
  
  <!-- Wordmark -->
  <text x="85" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="-0.02em">
    <tspan fill="url(#text-gradient-dark)">Athl</tspan><tspan fill="#0f172a" font-weight="800">yx</tspan>
  </text>
</svg>
